[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read", path = "./" }]

[rpc_endpoints]
opbnb_testnet = "https://opbnb-testnet-rpc.bnbchain.org"
bsc_testnet = "https://data-seed-prebsc-1-s1.bnbchain.org:8545"

# Explorer: deploy does not need a key. For `forge verify-contract` use Etherscan API V2 + a key from
# https://etherscan.io/apis (works across supported chains; legacy per-explorer V1 URLs are deprecated).
# Example: --verifier-url "https://api.etherscan.io/v2/api?chainid=5611" for opBNB Testnet (5611).
[etherscan]
opbnb_testnet = { key = "", url = "https://api.etherscan.io/v2/api?chainid=5611" }
bsc_testnet = { key = "", url = "https://api.etherscan.io/v2/api?chainid=97" }
