[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read", path = "./" }]

[rpc_endpoints]
opbnb_testnet = "https://opbnb-testnet-rpc.bnbchain.org"
bsc_testnet = "https://data-seed-prebsc-1-s1.bnbchain.org:8545"

[etherscan]
opbnb_testnet = { key = "${OPBNB_API_KEY}", url = "https://api-opbnb-testnet.bscscan.com/api" }
bsc_testnet = { key = "${BSC_API_KEY}", url = "https://api-testnet.bscscan.com/api" }
