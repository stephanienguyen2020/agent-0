# Railway / Nixpacks — emagents workers (set service Root Directory to repo root `.`)
# Set env WORKER_MODULE per service:
#   emagents.verifier_worker | emagents.settlement | emagents.reputation
# Start runs scripts/railway-worker-start.sh
#
# "..." merges the Python provider default (venv + base pip install) before our editable installs.

[phases.install]
cmds = [
  "...",
  "pip install -e ./backend -e './agents[realtime]'",
]

[start]
cmd = "sh scripts/railway-worker-start.sh"
